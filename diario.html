<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario Emocional — Equi</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #2D3436; background-color: #FFFDF9; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        a { text-decoration: none; color: inherit; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 32px; border-radius: 50px; font-size: 0.95rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background-color: #5BA4A4; color: #fff; box-shadow: 0 4px 20px rgba(91,164,164,0.3); }
        .btn-primary:hover { background-color: #4E9494; }
        .btn-secondary { background-color: transparent; color: #2D3436; border: 2px solid #ddd; }
        .btn-secondary:hover { border-color: #5BA4A4; color: #5BA4A4; }
        .btn-danger { background-color: #E17055; color: #fff; padding: 8px 16px; font-size: 0.82rem; border-radius: 10px; }
        .btn-danger:hover { background-color: #D63031; }

        .navbar { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; padding: 16px 0; background-color: rgba(255,253,249,0.95); backdrop-filter: blur(12px); box-shadow: 0 1px 12px rgba(0,0,0,0.05); }
        .navbar .container { display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { display: flex; align-items: center; }
        .nav-logo img { height: 40px; }
        .nav-links { display: flex; list-style: none; gap: 28px; align-items: center; }
        .nav-links a { font-size: 0.9rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: #5BA4A4; }
        .nav-links .back-link { color: #5BA4A4; font-weight: 600; }

        .page-header { padding: 140px 0 60px; text-align: center; background: linear-gradient(160deg, #FFFDF9 0%, #FFF0E6 50%, #FFFDF9 100%); }
        .page-header .icon { font-size: 3rem; margin-bottom: 16px; }
        .page-header h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; margin-bottom: 12px; }
        .page-header h1 span { color: #5BA4A4; }
        .page-header p { font-size: 1.05rem; color: #666; max-width: 500px; margin: 0 auto; }

        .journal-section { padding: 60px 0 80px; flex: 1; }

        .journal-form { background: #fff; border-radius: 24px; padding: 36px; box-shadow: 0 4px 24px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.03); margin-bottom: 40px; }
        .journal-form h3 { font-size: 1.2rem; margin-bottom: 20px; }

        .mood-selector { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .mood-option { width: 56px; height: 56px; border-radius: 50%; border: 2px solid #eee; background: #fff; font-size: 1.5rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
        .mood-option:hover { transform: scale(1.15); border-color: #5BA4A4; }
        .mood-option.active { border-color: #5BA4A4; background: rgba(91,164,164,0.1); transform: scale(1.15); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: #444; margin-bottom: 8px; }
        .form-group input, .form-group textarea { width: 100%; padding: 14px 18px; border: 2px solid #eee; border-radius: 12px; font-size: 0.95rem; font-family: inherit; color: #2D3436; background: #FAFAFA; transition: border-color 0.3s, background 0.3s; outline: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: #5BA4A4; background: #fff; }
        .form-group textarea { resize: vertical; min-height: 150px; line-height: 1.8; }

        .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .tag { padding: 6px 16px; border-radius: 50px; border: 2px solid #eee; background: #fff; font-size: 0.82rem; cursor: pointer; transition: all 0.3s; }
        .tag:hover, .tag.active { border-color: #5BA4A4; background: rgba(91,164,164,0.08); color: #5BA4A4; }

        .entries-list h3 { font-size: 1.2rem; margin-bottom: 20px; }
        .entry-card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.03); margin-bottom: 16px; }
        .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .entry-date { font-size: 0.82rem; color: #999; }
        .entry-mood { font-size: 1.5rem; }
        .entry-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 8px; }
        .entry-text { font-size: 0.92rem; color: #555; line-height: 1.8; }
        .entry-tags { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
        .entry-tag { padding: 3px 10px; border-radius: 50px; background: rgba(91,164,164,0.08); color: #5BA4A4; font-size: 0.75rem; font-weight: 500; }
        .entry-actions { margin-top: 12px; }
        .no-entries { text-align: center; padding: 40px; color: #999; }

        footer { padding: 32px 0; background-color: #2D3436; color: rgba(255,255,255,0.6); text-align: center; margin-top: auto; }
        footer .footer-logo { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
        footer p { font-size: 0.82rem; }

        @media (max-width: 768px) {
            .mood-option { width: 48px; height: 48px; font-size: 1.3rem; }
            .journal-form { padding: 24px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo"><img src="images/logo-equi.png" alt="Equi"></a>
            <ul class="nav-links">
                <li><a href="index.html" class="back-link">&#8592; Volver al Inicio</a></li>
            </ul>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <div class="icon">&#128221;</div>
            <h1>Diario <span>Emocional</span></h1>
            <p>Explora tus emociones, identifica patrones y cultiva autoconciencia</p>
        </div>
    </header>

    <section class="journal-section">
        <div class="container">
            <div class="journal-form" id="journalForm">
                <h3>Nueva Entrada</h3>
                <label style="font-size:0.85rem;font-weight:500;color:#444;margin-bottom:12px;display:block;">¿Como te sientes hoy?</label>
                <div class="mood-selector" id="moodSelector">
                    <button class="mood-option" data-mood="&#128522;" title="Feliz">&#128522;</button>
                    <button class="mood-option" data-mood="&#128524;" title="Tranquilo">&#128524;</button>
                    <button class="mood-option" data-mood="&#128528;" title="Neutral">&#128528;</button>
                    <button class="mood-option" data-mood="&#128532;" title="Triste">&#128532;</button>
                    <button class="mood-option" data-mood="&#128545;" title="Enojado">&#128545;</button>
                    <button class="mood-option" data-mood="&#128552;" title="Ansioso">&#128552;</button>
                    <button class="mood-option" data-mood="&#129321;" title="Agotado">&#129321;</button>
                </div>
                <div class="form-group">
                    <label for="entryTitle">Titulo</label>
                    <input type="text" id="entryTitle" placeholder="Un titulo para tu entrada...">
                </div>
                <div class="form-group">
                    <label>Etiquetas</label>
                    <div class="tags" id="tagsSelector">
                        <span class="tag" data-tag="Estudios">Estudios</span>
                        <span class="tag" data-tag="Relaciones">Relaciones</span>
                        <span class="tag" data-tag="Trabajo">Trabajo</span>
                        <span class="tag" data-tag="Salud">Salud</span>
                        <span class="tag" data-tag="Familia">Familia</span>
                        <span class="tag" data-tag="Autoestima">Autoestima</span>
                        <span class="tag" data-tag="Gratitud">Gratitud</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="entryText">Escribe lo que sientes...</label>
                    <textarea id="entryText" placeholder="Permitete fluir. Escribe lo que venga a tu mente sin juzgarte..."></textarea>
                </div>
                <button class="btn btn-primary" id="saveEntry">Guardar Entrada</button>
            </div>

            <div class="entries-list" id="entriesList">
                <h3>Mis Entradas</h3>
                <div id="entriesContainer"></div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-logo">Equi.</div>
            <p>Creado con &#10084; por estudiantes universitarios</p>
        </div>
    </footer>

    <script>
        let selectedMood = '';
        let selectedTags = [];

        document.querySelectorAll('.mood-option').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mood-option').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedMood = btn.dataset.mood;
            });
        });

        document.querySelectorAll('.tag').forEach(tag => {
            tag.addEventListener('click', () => {
                tag.classList.toggle('active');
                const t = tag.dataset.tag;
                if (selectedTags.includes(t)) selectedTags = selectedTags.filter(x => x !== t);
                else selectedTags.push(t);
            });
        });

        document.getElementById('saveEntry').addEventListener('click', () => {
            const title = document.getElementById('entryTitle').value.trim();
            const text = document.getElementById('entryText').value.trim();
            if (!selectedMood || !text) {
                alert('Por favor selecciona tu animo y escribe algo.');
                return;
            }
            const entry = {
                id: Date.now(),
                date: new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' }),
                time: new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }),
                mood: selectedMood,
                title: title || 'Sin titulo',
                text: text,
                tags: [...selectedTags]
            };
            const entries = JSON.parse(localStorage.getItem('equi_journal') || '[]');
            entries.unshift(entry);
            localStorage.setItem('equi_journal', JSON.stringify(entries));
            document.getElementById('entryTitle').value = '';
            document.getElementById('entryText').value = '';
            document.querySelectorAll('.mood-option').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            selectedMood = '';
            selectedTags = [];
            loadEntries();
        });

        function loadEntries() {
            const entries = JSON.parse(localStorage.getItem('equi_journal') || '[]');
            const container = document.getElementById('entriesContainer');
            if (entries.length === 0) {
                container.innerHTML = '<div class="no-entries">Aun no tienes entradas. Escribe tu primera reflexion.</div>';
                return;
            }
            container.innerHTML = entries.map(e => `
                <div class="entry-card">
                    <div class="entry-header">
                        <span class="entry-date">${e.date} &middot; ${e.time}</span>
                        <span class="entry-mood">${e.mood}</span>
                    </div>
                    <div class="entry-title">${e.title}</div>
                    <div class="entry-text">${e.text}</div>
                    ${e.tags.length ? '<div class="entry-tags">' + e.tags.map(t => '<span class="entry-tag">' + t + '</span>').join('') + '</div>' : ''}
                    <div class="entry-actions">
                        <button class="btn-danger" onclick="deleteEntry(${e.id})">Eliminar</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteEntry(id) {
            if (!confirm('¿Eliminar esta entrada?')) return;
            let entries = JSON.parse(localStorage.getItem('equi_journal') || '[]');
            entries = entries.filter(e => e.id !== id);
            localStorage.setItem('equi_journal', JSON.stringify(entries));
            loadEntries();
        }

        loadEntries();
    </script>
</body>
</html>
